[env:esp32dev]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0
    arduino-libraries/NTPClient @ ^3.2

monitor_speed = 115200
upload_speed  = 921600
upload_port   = COM3

; No filesystem needed — dashboard HTML is in src/web_pages.cpp
; Single command to update everything including the webpage:
;   pio run -t upload

; ── OTA upload over WiFi ──────────────────────────────────────────────────────
;upload_protocol = espota
;upload_port     = 192.168.0.235
;upload_flags    = --auth=***

build_flags = -DCORE_DEBUG_LEVEL=0
