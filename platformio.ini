[env:esp32dev]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0
    arduino-libraries/NTPClient @ ^3.2

monitor_speed = 115200
upload_speed  = 921600

board_build.filesystem = littlefs
board_build.partitions = min_spiffs.csv   ; ← gives LittleFS a proper partition

; Automatically compresses data/index.html → include/dashboard_gz.h
; before every build. Edit index.html freely — just run pio run -t upload.
extra_scripts = pre:generate_html.py

; ── OTA upload (after first flash via USB) ───────────────────────────────────
; Uncomment to upload firmware over WiFi instead of USB:
; upload_protocol = espota
; upload_port     = relay-board-1.local
; upload_flags    = --auth=your_ota_password

build_flags =
    -DCORE_DEBUG_LEVEL=0