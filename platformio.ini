[env:esp32dev]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0
    arduino-libraries/NTPClient @ ^3.2

; generate_html.py fut build előtt:
;   1. data/index.html → src/web_pages.cpp (gzip)
;   2. secrets.ini-ből beolvassa az OTA jelszót és átadja az uploadnak
extra_scripts = pre:generate_html.py

monitor_speed = 115200
;upload_speed  = 921600
;upload_port   = COM3

; No filesystem needed — dashboard HTML is in src/web_pages.cpp
; Single command to update everything including the webpage:
;   pio run -t upload

; ── OTA upload over WiFi ──────────────────────────────────────────────────────
upload_protocol = espota
upload_port     = irrigationcontroller.local

build_flags = -DCORE_DEBUG_LEVEL=0
